    <div class="hero">

<div class="carousel" id="fileCarousel"></div>
<h1> </h1>
<h2 style="padding-left: 5px;">Add a playlist</h2>
<div class="controls">
    <input type="text" id="carouselName" placeholder="Playlist name" />
    <input type="file" id="playlistFile" accept=".txt" />
    <button onclick="addCarousel()">Add Playlist</button>
  </div>

  <div id="carousels"></div>

  <script>
    const carouselContainer = document.getElementById('carousels');

    // Load saved carousels from cookies
    window.onload = () => {
      const saved = getCookie('roryflixCarousels');
      if (saved) {
        const carousels = JSON.parse(saved);
        carousels.forEach(c => createCarousel(c.name, c.movies));
      }
    };

    function addCarousel() {
      const nameInput = document.getElementById('carouselName');
      const fileInput = document.getElementById('playlistFile');
      const name = nameInput.value.trim();
      const file = fileInput.files[0];

      if (!name || !file) {
        alert('Please provide a name and select a .txt file.');
        return;
      }

      const reader = new FileReader();
      reader.onload = function () {
        const lines = reader.result.split('\n').filter(Boolean);
        const movies = lines.map(line => {
        const [title, ...rest] = line.split(',');
        const videoUrl = rest.pop();
        const imgUrl = rest.join(',');
        return { title, imgUrl, videoUrl };
        });

        createCarousel(name, movies);
        saveCarouselsToCookie();
        nameInput.value = '';
        fileInput.value = '';
      };
      reader.readAsText(file);
    }

    function createCarousel(name, movies) {
      const container = document.createElement('div');
      container.className = 'carousel-container';

      const header = document.createElement('h2');
      header.textContent = name;

      const deleteBtn = document.createElement('button');
      deleteBtn.textContent = 'Delete';
      deleteBtn.onclick = () => {
        container.remove();
        saveCarouselsToCookie();
      };

      const headerWrapper = document.createElement('div');
      headerWrapper.appendChild(header);
      headerWrapper.appendChild(deleteBtn);

      const carousel = document.createElement('div');
      carousel.className = 'carousel';

      movies.forEach(movie => {
        const item = document.createElement('div');
        item.className = 'carousel-item';
        item.innerHTML = `
          <a href="${movie.videoUrl}" target="_blank" title="${movie.title}">
            <img src="${movie.imgUrl}" alt="${movie.title}" />
          </a>
        `;
        carousel.appendChild(item);
      });

      container.appendChild(headerWrapper);
      container.appendChild(carousel);
      carouselContainer.appendChild(container);
    }

    function saveCarouselsToCookie() {
      const data = [];
      const containers = carouselContainer.querySelectorAll('.carousel-container');
      containers.forEach(c => {
        const name = c.querySelector('h2').textContent;
        const items = Array.from(c.querySelectorAll('.carousel-item a')).map(a => {
          const img = a.querySelector('img');
          return {
            title: img.alt,
            imgUrl: img.src,
            videoUrl: a.href
          };
        });
        data.push({ name, movies: items });
      });
      document.cookie = "roryflixCarousels=" + JSON.stringify(data) + "; path=/; max-age=31536000";
    }

    function getCookie(name) {
      const value = `; ${document.cookie}`;
      const parts = value.split(`; ${name}=`);
      if (parts.length === 2) return parts.pop().split(';').shift();
    }
  </script>

</div>
<script>
// Helper cookie functions
function setCookie(name, value, days = 7) {
    const expires = new Date(Date.now() + days * 864e5).toUTCString();
    document.cookie = `${name}=${encodeURIComponent(value)}; expires=${expires}; path=/`;
}

function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) return decodeURIComponent(parts.pop().split(';').shift());
}

// Render carousel from file content
function renderFileCarousel(content) {
    const lines = content.split('\n').filter(Boolean);
    const container = document.getElementById('fileCarousel');
    container.innerHTML = '';

    lines.forEach(line => {
        const [title, imgUrl, movieUrl] = line.split(',');
        if (title && imgUrl && movieUrl) {
            const a = document.createElement('a');
            a.href = movieUrl.trim();
            a.target = '_blank';

            const img = document.createElement('img');
            img.src = imgUrl.trim();
            img.alt = title.trim();
            img.style.width = '200px';
            img.style.borderRadius = '10px';
            img.style.transition = 'transform 0.3s';
            img.style.cursor = 'pointer';

            img.addEventListener('mouseover', () => img.style.transform = 'scale(1.1)');
            img.addEventListener('mouseout', () => img.style.transform = 'scale(1)');

            a.appendChild(img);
            container.appendChild(a);
        }
    });
}
//cookies for featured file shit here!
// File upload and save to cookie
document.getElementById('fileInput').addEventListener('change', function(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        const content = e.target.result;
        setCookie('featuredTvShows', content, 30);
        renderFileCarousel(content);
    };
    reader.readAsText(file);
});

// Auto-load saved carousel if cookie exists
window.addEventListener('DOMContentLoaded', () => {
    const savedContent = getCookie('featuredTvShows');
    if (savedContent) {
        renderFileCarousel(savedContent);
    }
});
</script>

    <script>
        const searchBar = document.getElementById('searchBar');
        const movieCarousel = document.getElementById('movieCarousel');
        const movies = movieCarousel.getElementsByTagName('a');

        searchBar.addEventListener('input', function() {
            const filter = searchBar.value.toLowerCase();
            Array.from(movies).forEach(function(movie) {
                const altText = movie.querySelector('img').alt;
                if (altText.toLowerCase().includes(filter)) {
                    movie.style.display = 'block';
                } else {
                    movie.style.display = 'none';
                }
            });

    <script>
  const recentlyViewedKey = 'recentlyViewedTv';
  const maxItems = 20;

  // Function to get cookie value by name
  function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) return decodeURIComponent(parts.pop().split(';').shift());
  }

  // Function to set cookie
  function setCookie(name, value, days = 7) {
    const expires = new Date(Date.now() + days * 864e5).toUTCString();
    document.cookie = `${name}=${encodeURIComponent(value)}; expires=${expires}; path=/`;
  }

  // Load and render Recently Viewed movies
  function loadRecentlyViewed() {
    const container = document.getElementById('recentlyViewedCarousel');
    const raw = getCookie(recentlyViewedKey);
    if (!raw) return;

    const data = JSON.parse(raw);
    data.forEach(({ href, src, alt }) => {
      const a = document.createElement('a');
      a.href = href;
      a.target = '_blank';

      const img = document.createElement('img');
      img.src = src;
      img.alt = alt;

      a.appendChild(img);
      container.appendChild(a);
    });
  }

  // Attach click listeners to movie links
  const movieLinks = document.querySelectorAll('#movieCarousel a');
  movieLinks.forEach(link => {
    link.addEventListener('click', () => {
      const img = link.querySelector('img');
      const viewed = { href: link.href, src: img.src, alt: img.alt };

      let viewedList = JSON.parse(getCookie(recentlyViewedKey) || '[]');
      viewedList = viewedList.filter(v => v.href !== viewed.href); // Remove duplicates
      viewedList.unshift(viewed); // Add to beginning
      if (viewedList.length > maxItems) viewedList.pop(); // Keep only latest 20

      setCookie(recentlyViewedKey, JSON.stringify(viewedList));
    });
  });

  // On page load
  loadRecentlyViewed();
</script>
